<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>履歴</title>

<style>
body{
    font-family: monospace;
    font-size:16px;
}
</style>

</head>

<body>

<h2 id="title"></h2>
<pre id="result"></pre>

<script>

const params = new URLSearchParams(location.search);
const code = params.get("code");

document.getElementById("title").textContent = "履歴 " + code;

fetch(encodeURI("定時在庫.csv"))
.then(r => r.arrayBuffer())
.then(buf => new TextDecoder("shift-jis").decode(buf))
.then(text => {

    const lines = text.split("\n");

    const filtered = lines.filter(line => line.includes("," + code + ","));

    const formatted = filtered.map(line => {

        const c = line.split(",");

        const zaiko = Number(c[0]).toLocaleString().padStart(8);
        const time  = c[2];
        const memo  = c[5];

        return `${zaiko}  ${time}  ${memo}`;

    });

    document.getElementById("result").textContent =
        formatted.join("\n");

});

</script>

</body>
</html>
